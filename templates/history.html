<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeOptimize - History</title>
    <!-- CodeMirror CSS and Themes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/theme/monokai.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/theme/material-darker.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reuse the same CSS as the home page */
        :root {
            --primary: #4361ee;
            --secondary: #3a0ca3;
            --accent: #f72585;
            --dark: #0f0e17;
            --light: #fffffe;
            --success: #2cb67d;
            --card-bg: #16161d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 25px 0 100px;
            position: relative;
            overflow: hidden;
        }

        .header-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.3) 1px, transparent 1px),
                radial-gradient(circle at 50% 70%, rgba(255, 255, 255, 0.2) 1px, transparent 1px),
                radial-gradient(circle at 80% 40%, rgba(255, 255, 255, 0.3) 2px, transparent 2px);
            background-size: 20px 20px;
        }

        .hero {
            position: relative;
            text-align: center;
            margin-top: 30px;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 15px;
            background: linear-gradient(to right, #fff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .hero p {
            max-width: 600px;
            margin: 0 auto 30px;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            position: relative;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--light);
            text-decoration: none;
        }

        .logo-icon {
            font-size: 1.4rem;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-link {
            color: var(--light);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 8px 0;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--light);
            transition: width 0.3s;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .editor-section {
            max-width: 1200px;
            margin: -50px auto 50px;
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            padding: 20px;
            position: relative;
            z-index: 10;
            flex: 1;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .history-item pre {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .history-item .timestamp {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .back-button:hover {
            background: var(--primary);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-bg"></div>
        <nav>
            <a href="/" class="logo">
                <i class="fa-solid fa-code logo-icon"></i>
                OptiAI
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/features" class="nav-link">Features</a>
                <a href="/history" class="nav-link">History</a>
                <a href="/about" class="nav-link">About</a>
            </div>
        </nav>
        <div class="hero">
            <h1>Optimized Code History</h1>
            <p>View your saved optimized code snippets with timestamps</p>
        </div>
    </header>

    <main>
        <section class="editor-section">
            <a href="/" class="back-button">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
            <div id="history-list">
                <!-- History items will be dynamically inserted here -->
            </div>
        </section>
    </main>

    <script>
        // Retrieve saved history from localStorage
        const historyList = document.getElementById('history-list');
        const history = JSON.parse(localStorage.getItem('optimizedCodeHistory')) || [];

        // Display history items
        history.forEach((item) => {
            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';

            const timestamp = document.createElement('div');
            timestamp.className = 'timestamp';
            timestamp.textContent = `Saved on: ${item.timestamp}`;
            historyItem.appendChild(timestamp);

            const codeBlock = document.createElement('pre');
            codeBlock.textContent = item.code;
            historyItem.appendChild(codeBlock);

            historyList.appendChild(historyItem);
        });
    </script>
</body>
</html>
